spring.application.name=KiaEvPlatform
api.key=
api.key.ev-charger=${CHARGING_API_KEY}
api.key.kakao-map=${KAKAO_API_KEY}


aws.region=us-east-1
aws.secretName=ChargingApiKey_Secret

# MySQL DB 설정
spring.datasource.url=jdbc:mysql://localhost:3306/kiaevdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate 설정
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


# ddl-auto 속성: Entity 클래스 기반으로 DB 테이블을 자동 생성/수정
spring.jpa.hibernate.ddl-auto=update

# 콘솔창에 JPA가 실행하는 SQL 쿼리를 보기 좋게 출력
spring.jpa.properties.hibernate.show_sql=true


