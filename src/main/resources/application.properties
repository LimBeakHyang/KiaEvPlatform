spring.application.name=KiaEvPlatform
api.key=
api.key.ev-charger=${CHARGING_API_KEY}
api.key.kakao-map=${KAKAO_API_KEY}

aws.region=us-east-1
aws.secretName=ChargingApiKey_Secret

# ==========================================
# 1. MySQL DB 연결 설정
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/kiaevdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

# ==========================================
# 2. JPA & Hibernate 설정
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 3. Hibernate 로그
# ==========================================
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace