<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>판매 관리</title>

<!-- =====================================================
     딜러 공통 스타일
===================================================== -->
<link rel="stylesheet" th:href="@{/css/dealer-common.css}">
</head>
<body>

	<div class="dealer-layout">

		<!-- =====================================================
		     좌측 사이드바
		     - 현재 화면은 판매 관리 활성화
		     - 메뉴와 로그아웃 영역을 분리
		     - 대시보드 화면과 동일한 구조로 통일
		===================================================== -->
		<aside class="sidebar">
			<a th:href="@{/dealer/main}" class="logo">KIA EV Dealer</a>

			<!-- =========================
			     메뉴 영역
			========================= -->
			<nav class="menu">
				<a th:href="@{/dealer/main}">대시보드</a> <a
					th:href="@{/dealer/consult/list}">상담 관리</a> <a
					th:href="@{/dealer/sales/list}" class="active">판매 관리</a> <a
					th:href="@{/dealer/sales/register}">판매 등록</a> <a
					th:href="@{/dealer/statistics}">통계</a>
			</nav>

			<!-- =========================
			     로그아웃 영역
			     - 메뉴 바깥으로 분리
			     - 사이드바 하단 고정 역할
			========================= -->
			<div class="logout-area">
				<a th:href="@{/dealer/logout}" class="logout-btn">로그아웃</a>
			</div>
		</aside>

		<!-- =====================================================
		     메인 컨텐츠
		===================================================== -->
		<main class="content sales-page">

			<!-- =========================
			     상단 제목
			========================= -->
			<header class="topbar">
				<h1>판매 관리</h1>
			</header>

			<!-- =========================
			     처리 결과 메시지
			========================= -->
			<div th:if="${successMessage != null}"
				class="message-box message-success">
				<p th:text="${successMessage}"></p>
			</div>

			<div th:if="${errorMessage != null}"
				class="message-box message-error">
				<p th:text="${errorMessage}"></p>
			</div>

			<!-- =========================
			     판매 요약 현황
			     - 불필요한 설명 문구 제거
			     - 숫자 가독성 중심 구성
			========================= -->
			<section class="panel sales-summary-panel">
				<div class="panel-header">
					<h2 class="section-title">등록된 판매 현황</h2>
				</div>

				<div class="summary-grid sales-summary-grid">

					<!-- 총 판매 건수 -->
					<div class="summary-card summary-card-dark summary-card-sales">
						<div class="summary-card-label">Sales Count</div>
						<div class="summary-card-title">총 판매 건수</div>
						<div class="summary-card-value summary-card-value-lg"
							th:text="${salesCount != null ? salesCount + '건' : '0건'}">
							0건</div>
					</div>

					<!-- 총 판매 금액 -->
					<div class="summary-card summary-card-dark summary-card-sales">
						<div class="summary-card-label">Total Amount</div>
						<div class="summary-card-title">총 판매 금액</div>
						<div class="summary-card-value summary-card-value-lg amount-text"
							th:text="${totalSalesAmount != null ? #numbers.formatInteger(totalSalesAmount, 3, 'COMMA') + '원' : '0원'}">
							0원</div>
					</div>

				</div>
			</section>

			<!-- =========================
			     판매 목록
			     - 설명 문구 제거
			     - 버튼 위치 유지
			     - 테이블 가독성 유지
			========================= -->
			<section class="panel sales-list-panel">
				<div
					class="panel-header panel-header-between panel-header-align-center">
					<div>
						<h2 class="section-title">등록된 판매 내역</h2>
					</div>

					<a th:href="@{/dealer/sales/register}" class="btn btn-strong">판매
						등록</a>
				</div>

				<!-- =========================
				     테이블 가로 스크롤 대응
				========================= -->
				<div class="table-wrap">
					<table class="dealer-table sales-table">
						<thead>
							<tr>
								<th>판매번호</th>
								<th>상담번호</th>
								<th>회원번호</th>
								<th>차량번호</th>
								<th>판매금액</th>
								<th>판매상태</th>
								<th>판매일시</th>
								<th>상세보기</th>
							</tr>
						</thead>
						<tbody>

							<!-- =========================
							     데이터 없을 때
							========================= -->
							<tr th:if="${#lists.isEmpty(salesList)}">
								<td colspan="8" class="empty-message">
									<div class="empty-state">
										<div class="empty-state-title">등록된 판매 내역이 없습니다.</div>
										<div class="empty-state-desc">판매 등록 후 목록과 요약 현황에서 바로 확인할
											수 있습니다.</div>
									</div>
								</td>
							</tr>

							<!-- =========================
							     데이터 있을 때
							========================= -->
							<tr th:each="sales : ${salesList}">
								<td class="td-number" th:text="${sales.salesNo}">1</td>
								<td class="td-number" th:text="${sales.consultNo}">1</td>
								<td class="td-member" th:text="${sales.memberNo}">20260401</td>
								<td class="td-carno" th:text="${sales.carNo}">123가1111</td>

								<td class="td-amount amount-text"
									th:text="${sales.salesAmount != null ? #numbers.formatInteger(sales.salesAmount, 3, 'COMMA') + '원' : '-'}">
									50,000,000원</td>

								<td><span
									th:if="${sales.salesStatus == '완료' or sales.salesStatus == 'COMPLETED'}"
									class="status-badge status-completed">완료</span> <span
									th:if="${sales.salesStatus == '진행중' or sales.salesStatus == 'IN_PROGRESS'}"
									class="status-badge status-progress">진행중</span> <span
									th:if="${sales.salesStatus == '대기' or sales.salesStatus == 'WAITING'}"
									class="status-badge status-waiting">대기</span> <span
									th:if="${sales.salesStatus == null}">-</span></td>

								<td class="td-date"
									th:text="${sales.salesDate != null ? #temporals.format(sales.salesDate, 'yyyy-MM-dd HH:mm') : '-'}">
									2026-04-02 11:55</td>

								<td><a th:if="${sales.salesNo != null}"
									th:href="@{/dealer/sales/detail(salesNo=${sales.salesNo})}"
									class="btn btn-sm btn-detail">상세보기</a> <span
									th:if="${sales.salesNo == null}">-</span></td>
							</tr>

						</tbody>
					</table>
				</div>
			</section>

		</main>
	</div>

</body>
</html>
