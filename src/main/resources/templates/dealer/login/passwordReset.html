<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<!-- =========================================================
     브라우저 탭 제목
========================================================= -->
<title>딜러 비밀번호 변경</title>

<style>
/* =========================================================
   전체 공통 초기화
========================================================= */
* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
	font-family: Arial, "맑은 고딕", sans-serif;
}

/* =========================================================
   화면 전체 배경 및 중앙 정렬
========================================================= */
body {
	background-color: #f5f5f5;
	min-height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
}

/* =========================================================
   비밀번호 변경 박스
========================================================= */
.wrap {
	width: 550px;
	background: #ffffff;
	padding: 45px 40px;
	border-radius: 16px;
	box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
}

/* =========================================================
   제목
   - 색상만 변경: 푸른색 → 블랙 계열
========================================================= */
.title {
	text-align: center;
	font-size: 34px;
	font-weight: 800;
	color: #111111;
	margin-bottom: 28px;
}

/* =========================================================
   입력칸 영역
========================================================= */
.input-box {
	margin-bottom: 16px;
}

/* =========================================================
   입력칸 스타일
========================================================= */
.input-box input {
	width: 100%;
	height: 56px;
	border: 1px solid #d9d9d9;
	border-radius: 12px;
	padding: 0 16px;
	font-size: 16px;
	outline: none;
	background-color: #ffffff;
}

/* =========================================================
   입력칸 클릭 시
   - 색상만 변경: 푸른색 → 블랙 계열
========================================================= */
.input-box input:focus {
	border-color: #111111;
}

/* =========================================================
   비밀번호 안내 문구
========================================================= */
.guide-text {
	margin-top: -4px;
	margin-bottom: 14px;
	padding-left: 4px;
	font-size: 13px;
	color: #666666;
	line-height: 1.5;
}

/* =========================================================
   버튼 영역
========================================================= */
.btn-box {
	margin-top: 14px;
}

/* =========================================================
   버튼 공통
========================================================= */
.btn {
	width: 100%;
	height: 56px;
	border: none;
	border-radius: 12px;
	font-size: 18px;
	font-weight: 800;
	cursor: pointer;
}

/* =========================================================
   변경하기 버튼
   - 색상만 변경: 푸른색 → 블랙 계열
========================================================= */
.btn-primary {
	background-color: #111111;
	color: #ffffff;
}

.btn-primary:hover {
	background-color: #000000;
}

/* =========================================================
   메시지 영역
========================================================= */
.message {
	text-align: center;
	margin-bottom: 15px;
	font-size: 15px;
	font-weight: 700;
}

/* =========================================================
   오류 메시지
========================================================= */
.message-error {
	color: #d93025;
}

/* =========================================================
   성공 메시지
   - 색상만 변경: 푸른색 → 블랙 계열
========================================================= */
.message-success {
	color: #111111;
}
</style>
</head>
<body>

	<!-- =====================================================
	     비밀번호 변경 박스 시작
	===================================================== -->
	<div class="wrap">

		<!-- =================================================
		     제목
		================================================= -->
		<div class="title">비밀번호 변경</div>

		<!-- =================================================
		     오류 메시지 출력
		     - 기존 기능 유지
		     - Controller 에서 errorMessage 전달 시 출력
		================================================= -->
		<div th:if="${errorMessage}" class="message message-error"
			th:text="${errorMessage}"></div>

		<!-- =================================================
		     성공 메시지 출력
		     - 기존 기능 유지
		     - Controller 에서 successMessage 전달 시 출력
		================================================= -->
		<div th:if="${successMessage}" class="message message-success"
			th:text="${successMessage}"></div>

		<!-- =================================================
		     비밀번호 변경 폼
		     - 기존 action 유지
		     - POST /dealer/password/reset 로 전송
		     - 성공 시 Controller에서 로그인 화면 이동 처리
		================================================= -->
		<form th:action="@{/dealer/password/reset}" method="post">

			<!-- =============================================
			     사원번호 입력
			     - 기존 기능 유지
			============================================= -->
			<div class="input-box">
				<input type="text" name="dealerEmpNo" placeholder="사원번호" required
					maxlength="30" autocomplete="username">
			</div>

			<!-- =============================================
			     이름 입력
			     - 기존 기능 유지
			============================================= -->
			<div class="input-box">
				<input type="text" name="dealerName" placeholder="이름" required
					maxlength="50" autocomplete="name">
			</div>

			<!-- =============================================
			     새 비밀번호 입력
			     - 기존 기능 유지
			============================================= -->
			<div class="input-box">
				<input type="password" name="newPassword" placeholder="새 비밀번호"
					required minlength="4" maxlength="6" autocomplete="new-password">
			</div>

			<!-- =============================================
			     새 비밀번호 확인 입력
			     - 기존 기능 유지
			============================================= -->
			<div class="input-box">
				<input type="password" name="confirmPassword"
					placeholder="새 비밀번호 확인" required minlength="4" maxlength="6"
					autocomplete="new-password">
			</div>

			<!-- =============================================
			     비밀번호 정책 안내 문구
			     - 기존 기능 유지
			============================================= -->
			<div class="guide-text">비밀번호는 4자 이상 6자 이하로 입력해주세요.</div>

			<!-- =============================================
			     변경하기 버튼
			     - 기존 기능 유지
			============================================= -->
			<div class="btn-box">
				<button type="submit" class="btn btn-primary">변경하기</button>
			</div>
		</form>
	</div>
	<!-- =====================================================
	     비밀번호 변경 박스 끝
	===================================================== -->

</body>
</html>
