<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>딜러 메인페이지</title>

<!-- =====================================================
     딜러 공통 CSS 연결
===================================================== -->
<link rel="stylesheet" th:href="@{/css/dealer-common.css}">
</head>
<body>

	<div class="dealer-layout">

		<!-- =====================================================
		     좌측 사이드바
		     - fragment 없이 직접 작성
		     - 메뉴 순서: 대시보드 → 상담 관리 → 판매 관리 → 판매 등록 → 통계
		     - 현재 페이지는 대시보드 활성화
		     - 로그아웃 버튼 추가
		===================================================== -->
		<aside class="sidebar">
			<a th:href="@{/dealer/main}" class="logo">KIA EV Dealer</a>

			<nav class="menu">
				<a th:href="@{/dealer/main}" class="active">대시보드</a> <a
					th:href="@{/dealer/consult/list}">상담 관리</a> <a
					th:href="@{/dealer/sales/list}">판매 관리</a> <a
					th:href="@{/dealer/sales/register}">판매 등록</a> <a
					th:href="@{/dealer/statistics}">통계</a>
			</nav>

			<!-- =====================================================
			     로그아웃 영역
			     - 사이드바 하단에 배치
			===================================================== -->
			<div class="logout-area">
				<a th:href="@{/dealer/logout}" class="logout-btn">로그아웃</a>
			</div>
		</aside>

		<!-- =====================================================
		     메인 컨텐츠 영역
		===================================================== -->
		<main class="content">
			<div class="dashboard-container">

				<!-- =========================
				     상단 페이지 제목 영역
				========================= -->
				<div class="page-header">
					<h1 class="page-title">대시보드</h1>
				</div>

				<!-- =========================
				     환영 영역
				========================= -->
				<section class="hero-panel">
					<div class="hero-left">
						<h2>
							<span th:if="${dashboard != null}"
								th:text="${dashboard.dealerName}">딜러명</span> <span
								th:if="${dashboard == null}">딜러</span> 님, 반갑습니다.
						</h2>

						<p>
							딜러번호 : <strong th:if="${dashboard != null}"
								th:text="${dashboard.dealerNo}">1</strong> <strong
								th:if="${dashboard == null}">0</strong>
						</p>
					</div>
				</section>

				<!-- =========================
				     요약 카드 영역
				========================= -->
				<section class="summary-grid">

					<!-- 전체 상담 건수 -->
					<div class="summary-card">
						<div class="summary-card-title">전체 상담 건수</div>
						<div class="summary-card-value"
							th:text="${dashboard != null ? dashboard.totalConsultCount : 0}">
							0</div>
					</div>

					<!-- 전체 판매 건수 -->
					<div class="summary-card">
						<div class="summary-card-title">전체 판매 건수</div>
						<div class="summary-card-value"
							th:text="${dashboard != null ? dashboard.totalSalesCount : 0}">
							0</div>
					</div>

					<!-- 총 판매 금액 -->
					<div class="summary-card">
						<div class="summary-card-title">총 판매 금액</div>
						<div class="summary-card-value"
							th:text="${dashboard != null and dashboard.totalSalesAmount != null ? #numbers.formatInteger(dashboard.totalSalesAmount, 3, 'COMMA') + '원' : '0원'}">
							0원</div>
					</div>
				</section>

				<!-- =========================
				     상담 상태 요약 영역
				========================= -->
				<section class="panel dashboard-panel">
					<div class="section-title">상담 상태 현황</div>

					<div class="table-wrap">
						<table class="dealer-table">
							<thead>
								<tr>
									<th>대기</th>
									<th>진행중</th>
									<th>완료</th>
								</tr>
							</thead>
							<tbody>
								<tr>
									<td
										th:text="${dashboard != null ? dashboard.waitingConsultCount : 0}">0</td>
									<td
										th:text="${dashboard != null ? dashboard.inProgressConsultCount : 0}">0</td>
									<td
										th:text="${dashboard != null ? dashboard.completedConsultCount : 0}">0</td>
								</tr>
							</tbody>
						</table>
					</div>
				</section>

			</div>
		</main>
	</div>

</body>
</html>
