<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>비밀번호 찾기</title>
<style>
body {
    font-family: 'Malgun Gothic', sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
}
.wrap {
    width: 500px;
    margin: 80px auto;
    background: white;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
h2 {
    text-align: center;
    margin-bottom: 30px;
}
.input-box {
    margin-bottom: 15px;
}
input {
    width: 100%;
    height: 50px;
    padding: 0 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    box-sizing: border-box;
}
button {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 10px;
    background: #001b33;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}
.links {
    margin-top: 20px;
    text-align: center;
}
.links a {
    color: #666;
    text-decoration: none;
    margin: 0 8px;
}
.error-msg {
    color: red;
    text-align: center;
    font-weight: bold;
    margin-top: 10px;
}
.success-msg {
    color: green;
    text-align: center;
    font-weight: bold;
    margin-bottom: 15px;
}
</style>
</head>
<body>

<div class="wrap">
    <h2>비밀번호 찾기</h2>

    <!-- 1단계: 본인확인 -->
    <form th:if="${findPwSuccess == null}" th:action="@{/client/login/findPw}" method="post">
        <div class="input-box">
            <input type="text" name="loginId" placeholder="아이디 입력" required>
        </div>
        <div class="input-box">
            <input type="email" name="email" placeholder="이메일 입력" required>
        </div>
        <button type="submit">본인확인</button>
    </form>

    <!-- 2단계: 새 비밀번호 입력 -->
    <form th:if="${findPwSuccess != null}" th:action="@{/client/login/updatePw}" method="post">
        <div class="success-msg">본인확인 성공! 새 비밀번호를 입력해주세요.</div>

        <input type="hidden" name="loginId" th:value="${loginId}">
        <input type="hidden" name="email" th:value="${email}">

        <div class="input-box">
            <input type="text" th:value="${loginId}" readonly>
        </div>

        <div class="input-box">
            <input type="email" th:value="${email}" readonly>
        </div>

        <div class="input-box">
            <input type="password" name="newPassword" placeholder="새 비밀번호 입력" required>
        </div>

        <div class="input-box">
            <input type="password" name="confirmPassword" placeholder="새 비밀번호 확인" required>
        </div>

        <button type="submit">비밀번호 변경</button>
    </form>

    <div th:if="${resetPwError}" class="error-msg" th:text="${resetPwError}"></div>

    <div class="links">
        <a th:href="@{/login}">로그인</a> |
        <a th:href="@{/client/login/findId}">아이디 찾기</a>
    </div>
</div>

<th:block th:if="${findPwFail}">
    <script>
        alert("본인확인 실패\n입력하신 정보와 일치하는 회원이 없습니다.");
    </script>
</th:block>

<th:block th:if="${resetPwSuccess}">
    <script>
        alert("비밀번호가 변경되었습니다. 다시 로그인해주세요.");
        location.href = "/login";
    </script>
</th:block>

</body>
</html>
