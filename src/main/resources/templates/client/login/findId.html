<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>아이디 찾기</title>
<style>
body {
    font-family: 'Malgun Gothic', sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
}
.wrap {
    width: 500px;
    margin: 80px auto;
    background: white;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
h2 {
    text-align: center;
    margin-bottom: 30px;
}
.input-box {
    margin-bottom: 15px;
}
input {
    width: 100%;
    height: 50px;
    padding: 0 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    box-sizing: border-box;
}
button {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 10px;
    background: #001b33;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}
.links {
    margin-top: 20px;
    text-align: center;
}
.links a {
    color: #666;
    text-decoration: none;
    margin: 0 8px;
}
</style>
</head>
<body>

<div class="wrap">
    <h2>아이디 찾기</h2>

    <form th:action="@{/client/login/findId}" method="post">
        <div class="input-box">
            <input type="text" name="memberName" placeholder="이름 입력" required>
        </div>
        <div class="input-box">
            <input type="email" name="email" placeholder="이메일 입력" required>
        </div>
        <button type="submit">아이디 찾기</button>
    </form>

    <div class="links">
        <a th:href="@{/login}">로그인</a> |
        <a th:href="@{/client/login/findPw}">비밀번호 찾기</a>
    </div>
</div>

<script th:inline="javascript">
    const foundLoginId = /*[[${foundLoginId}]]*/ null;
    const findIdFail = /*[[${findIdFail}]]*/ false;

    if (foundLoginId != null && foundLoginId !== '') {
        alert("아이디 찾기 성공!\n아이디는 '" + foundLoginId + "' 입니다.");
    }

    if (findIdFail) {
        alert("아이디 찾기 실패\n입력하신 정보와 일치하는 아이디가 없습니다.");
    }
</script>

</body>
</html>
