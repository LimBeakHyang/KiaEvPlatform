<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>KIA EV - 로그인</title>
<style>
* {
	box-sizing: border-box;
}

body {
	margin: 0;
	padding: 0;
	font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
	background-color: #f8f9fa;
}

.login-container {
	width: 1200px;
	margin: 0 auto;
	padding: 160px 0 100px;
	min-height: calc(100vh - 100px);
	display: flex;
	justify-content: center;
	align-items: flex-start;
	box-sizing: border-box;
}

.login-box {
	width: 560px;
	padding: 60px 50px 45px;
	border: 1px solid #eee;
	border-radius: 20px;
	box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07);
	background: #fff;
}

.login-title {
	font-size: 32px;
	font-weight: 800;
	color: #05141f;
	text-align: center;
	margin: 0 0 35px 0;
	letter-spacing: -1px;
}

.type-selector {
	display: flex;
	justify-content: center;
	gap: 40px;
	margin-bottom: 28px;
	padding-bottom: 25px;
	border-bottom: 1px solid #f0f0f0;
}

.type-option {
	display: flex;
	align-items: center;
	cursor: pointer;
	font-size: 20px;
	color: #222;
	font-weight: 600;
}

.type-option input {
	margin-right: 10px;
	accent-color: #05141f;
	width: 18px;
	height: 18px;
	cursor: pointer;
}

.form-group {
	margin-bottom: 18px;
}

.form-input {
	width: 100%;
	height: 58px;
	padding: 0 18px;
	border: 1px solid #ddd;
	border-radius: 10px;
	box-sizing: border-box;
	font-size: 18px;
	outline: none;
	transition: 0.2s;
}

.form-input:focus {
	border-color: #05141f;
	box-shadow: 0 0 0 3px rgba(5, 20, 31, 0.05);
}

.btn-login {
	width: 100%;
	height: 58px;
	background: #05141f;
	color: #fff;
	border: none;
	border-radius: 10px;
	font-size: 22px;
	font-weight: 700;
	cursor: pointer;
	margin-top: 12px;
	transition: 0.3s;
}

.btn-login:hover {
	background: #1a2a3a;
	transform: translateY(-1px);
}

.login-footer-links {
	margin-top: 28px;
	display: flex;
	justify-content: center;
	gap: 14px;
	font-size: 16px;
	color: #999;
}

.login-footer-links a {
	text-decoration: none;
	color: #999;
	transition: 0.2s;
}

.login-footer-links a:hover {
	color: #05141f;
	font-weight: 700;
}

.join-prompt {
	margin-top: 35px;
	padding-top: 24px;
	border-top: 1px solid #f0f0f0;
	text-align: center;
	font-size: 16px;
	color: #999;
}

.btn-join {
	color: #05141f;
	font-weight: 700;
	text-decoration: none;
	margin-left: 8px;
}

.msg {
	margin-top: 14px;
	text-align: center;
	font-size: 15px;
	font-weight: 700;
	color: #c62828;
}
</style>
</head>
<body>

	<th:block th:replace="~{common/header :: header}"></th:block>

	<main class="login-container">
		<div class="login-box">
			<h2 class="login-title">LOGIN</h2>

			<div class="type-selector">
				<label class="type-option"> <input type="radio"
					name="userType" value="MEMBER" checked
					onclick="handleTypeChange('MEMBER')"> <span>회원</span>
				</label> <label class="type-option"> <input type="radio"
					name="userType" value="DEALER" onclick="handleTypeChange('DEALER')">
					<span>딜러</span>
				</label>
			</div>

			<form id="loginForm" th:action="@{/login}" method="post">
				<div class="form-group">
					<input type="text" id="targetId" name="loginId" class="form-input"
						placeholder="아이디" required>
				</div>

				<div class="form-group">
					<input type="password" id="memberPw" name="memberPw"
						class="form-input" placeholder="비밀번호" required>
				</div>

				<button type="submit" class="btn-login">로그인</button>
			</form>

			<div th:if="${loginError}" class="msg" th:text="${loginError}"></div>

			<div class="login-footer-links">
				<a th:href="@{/client/login/findId}" id="findIdLink">아이디 찾기</a> <span
					id="findDivider">|</span> <a th:href="@{/client/login/findPw}"
					id="findPwLink">비밀번호 찾기</a>
			</div>
	

			<div class="join-prompt" id="joinPrompt">
				아직 회원이 아니신가요? <a th:href="@{/member/join}" class="btn-join">회원가입</a>
			</div>
		</div>
	</main>

	<th:block th:replace="~{common/footer :: footer}"></th:block>

	<th:block th:if="${joinSuccess != null}">
		<script>
			alert('회원가입 성공! 로그인해주세요.');
		</script>
	</th:block>

	<script>
		function handleTypeChange(type) {
			const form = document.getElementById('loginForm');
			const idInput = document.getElementById('targetId');
			const findIdLink = document.getElementById('findIdLink');
			const findPwLink = document.getElementById('findPwLink');
			const findDivider = document.getElementById('findDivider');
			const joinPrompt = document.getElementById('joinPrompt');

			if (type === 'MEMBER') {
			    form.action = '/login';
			    idInput.name = 'loginId';
			    idInput.placeholder = '아이디';

			    findIdLink.style.display = 'inline';
			    findPwLink.style.display = 'inline';
			    findDivider.style.display = 'inline';
			    joinPrompt.style.display = 'block';
			} else {
			    form.action = '/dealer/login';
			    idInput.name = 'dealerId';
			    idInput.placeholder = '사원번호';

			    findIdLink.style.display = 'none';
			    findPwLink.style.display = 'inline';
			    findDivider.style.display = 'none';
			    joinPrompt.style.display = 'none';
			}
			
			idInput.value = '';
			document.getElementById('memberPw').value = '';
		}

		window.onload = function() {
			const checkedType = document
					.querySelector('input[name="userType"]:checked');
			if (checkedType) {
				handleTypeChange(checkedType.value);
			}
		};
	</script>

</body>
</html>
