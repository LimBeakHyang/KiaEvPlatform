<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KIA EV - 전기차 충전소 지도</title>
    <style>
        /* 1. 푸터 고정을 위한 레이아웃 설정 (기능 영향 없음) */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Pretendard', sans-serif;
            background-color: #f8f9fa;
        }

        /* 본문이 남은 공간을 차지해 푸터를 아래로 밀어줌 */
        .main-wrapper {
            flex: 1;
            width: 1200px;
            margin: 0 auto;
            padding: 110px 0 80px; /* 헤더 높이만큼 상단 여백 */
            box-sizing: border-box;
        }

        /* 2. 검색 컨테이너 스타일 */
        .search-container { 
            margin-bottom: 15px; 
            padding: 20px; 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .search-container input { 
            padding: 10px 15px; 
            width: 320px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 14px;
            outline: none;
        }
        .search-container button { 
            padding: 10px 18px; 
            margin-left: 5px; 
            cursor: pointer; 
            border: none; 
            background-color: #007bff; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: 0.2s;
        }
        .search-container button:hover { opacity: 0.9; }
        .search-container button.reset-btn { background-color: #6c757d; }
        .search-container button.location-btn { background-color: #28a745; }
        .search-container button.view-search-btn { background-color: #ff9800; }

        h2 {
            font-size: 32px;
            color: #05141f;
            margin-bottom: 30px;
            font-weight: 700;
        }

        #map {
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <th:block th:replace="~{common/header :: header}"></th:block>

    <main class="main-wrapper">
        <h2>카카오맵 전기차 충전소 검색</h2>

        <div class="search-container">
            <input type="text" id="keyword" placeholder="충전소 이름 또는 지역명(예: 서울, 성남, 제주)" onkeypress="if(event.keyCode==13) document.getElementById('searchBtn').click();" />
            <button id="searchBtn" type="button">통합 검색</button>
            <button id="searchInViewBtn" type="button" class="view-search-btn">현재 화면에서 찾기</button>
            <button id="myLocationBtn" type="button" class="location-btn">현재 위치(2km 이내)</button>
            <button id="resetBtn" type="button" class="reset-btn">전체 보기(화면 맞춤)</button>
        </div>

        <div id="map" style="width:100%; height:600px;"></div>
    </main>

    <th:block th:replace="~{common/footer :: footer}"></th:block>

    <script th:src="@{'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoApiKey}}"></script>

    <script>
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.5665, 126.9780),
            level: 7
        };
        const map = new kakao.maps.Map(container, options);

        let allChargers = [];
        const markers = [];
        let myLocationMarker = null;
        let openInfowindow = null;

        fetch('/api/charging/stations')
            .then(response => response.json())
            .then(data => {
                allChargers = data;
                displayChargers(allChargers, true);
            })
            .catch(error => console.error('데이터 로딩 실패:', error));

        function clearMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers.length = 0;
        }

        function clearMyLocationMarker() {
            if (myLocationMarker) {
                myLocationMarker.setMap(null);
                myLocationMarker = null;
            }
        }

        function displayChargers(chargerList, fitBounds = false) {
            clearMarkers();
            if (openInfowindow) {
                openInfowindow.close();
                openInfowindow = null;
            }

            if (chargerList.length === 0) {
                alert('해당하는 충전소가 없습니다. 검색어를 확인해주세요.');
                return;
            }

            const bounds = new kakao.maps.LatLngBounds();

            if (myLocationMarker) {
                bounds.extend(myLocationMarker.getPosition());
            }

            for (let i = 0; i < chargerList.length; i++) {
                const charger = chargerList[i];
                const markerPosition = new kakao.maps.LatLng(charger.lat, charger.lng);
                bounds.extend(markerPosition);

                const marker = new kakao.maps.Marker({
                    map: map,
                    position: markerPosition,
                    title: charger.statNm
                });
                markers.push(marker);

                const content = `
                    <div style="padding:10px; min-width:250px; line-height:1.5;">
                        <div style="font-weight:bold; margin-bottom:6px; color:#007bff;">${charger.statNm}</div>
                        <div style="font-size:13px;">주소: ${charger.addr || '정보 없음'}</div>
                        <div style="font-size:13px;">이용 시간: ${charger.useTime || '정보 없음'}</div>
                    </div>
                `;
                const infowindow = new kakao.maps.InfoWindow({ content: content });

                kakao.maps.event.addListener(marker, 'click', function () {
                    if (openInfowindow) {
                        openInfowindow.close();
                    }
                    infowindow.open(map, marker);
                    openInfowindow = infowindow;
                });
            }

            if (fitBounds) {
                map.setBounds(bounds);
            }
        }

        function getDistanceInMeters(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const toRadians = Math.PI / 180;
            const dLat = (lat2 - lat1) * toRadians;
            const dLng = (lng2 - lng1) * toRadians;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * toRadians) * Math.cos(lat2 * toRadians) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function normalizeKeyword(value) {
            return (value || '').replace(/\s+/g, '').toLowerCase();
        }

        document.getElementById('searchBtn').addEventListener('click', function () {
            const keyword = document.getElementById('keyword').value.trim();
            if (keyword === '') {
                displayChargers(allChargers, true);
                return;
            }

            const normalizedKeyword = normalizeKeyword(keyword);
            const filteredChargers = allChargers.filter(function (charger) {
                const searchTarget = normalizeKeyword([
                    charger.statNm,
                    charger.addr,
                    charger.addrDetail,
                    charger.locationDesc
                ].filter(Boolean).join(' '));

                return searchTarget.includes(normalizedKeyword);
            });

            displayChargers(filteredChargers, true);
        });

        document.getElementById('resetBtn').addEventListener('click', function () {
            document.getElementById('keyword').value = '';
            displayChargers(allChargers, true);
        });

        document.getElementById('searchInViewBtn').addEventListener('click', function () {
            const bounds = map.getBounds();
            const chargersInView = allChargers.filter(function (charger) {
                const chargerPosition = new kakao.maps.LatLng(charger.lat, charger.lng);
                return bounds.contain(chargerPosition);
            });
            displayChargers(chargersInView, false);
            document.getElementById('keyword').value = '';
        });

        document.getElementById('myLocationBtn').addEventListener('click', function () {
            if (!navigator.geolocation) {
                alert('위치 정보를 지원하지 않습니다.');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    const myLat = position.coords.latitude;
                    const myLng = position.coords.longitude;
                    const myPosition = new kakao.maps.LatLng(myLat, myLng);

                    clearMyLocationMarker();
                    const markerImage = new kakao.maps.MarkerImage(
                        'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
                        new kakao.maps.Size(24, 35)
                    );

                    myLocationMarker = new kakao.maps.Marker({
                        map: map,
                        position: myPosition,
                        title: '현재 위치',
                        image: markerImage
                    });

                    const nearbyChargers = allChargers.filter(function (charger) {
                        const distance = getDistanceInMeters(myLat, myLng, charger.lat, charger.lng);
                        return distance <= 2000;
                    });

                    displayChargers(nearbyChargers, true);
                },
                function (error) {
                    alert('위치 정보를 가져올 수 없습니다.');
                    console.error(error);
                }
            );
        });
    </script>
</body>
</html>
