<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>약관동의</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Malgun Gothic', sans-serif;
    background: #f5f6f8;
}

/* 추가: 앙카 로고 */
.logo-link {
    text-decoration: none;
    color: #0b1f33;
    font-weight: 800;
}

.logo-link:hover {
    color: #163554;
}

.wrap {
    width: 700px;
    margin: 60px auto;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    padding: 40px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #0b1f33;
    font-size: 32px;
}

.all-check {
    background: #f3f5f7;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: bold;
}

.term-box {
    border: 1px solid #ddd;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 18px;
}

.term-title {
    font-size: 17px;
    font-weight: bold;
    margin-bottom: 12px;
    color: #222;
}

.term-content {
    width: 100%;
    height: 120px;
    resize: none;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    background: #fafafa;
    color: #555;
    margin-top: 10px;
    line-height: 1.7;
}

.check-line {
    margin-top: 12px;
    font-size: 15px;
}

.btn-box {
    text-align: center;
    margin-top: 30px;
}

button {
    width: 220px;
    height: 52px;
    border: none;
    border-radius: 12px;
    background: #0b1f33;
    color: #fff;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #163554;
}

button:disabled {
    background: #aab4bf;
    cursor: not-allowed;
}

.notice {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-top: 15px;
}

.error-message {
    display: none;
    text-align: center;
    color: #d93025;
    font-size: 14px;
    font-weight: bold;
    margin-top: 14px;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("termsForm");
    const allCheck = document.getElementById("allCheck");
    const terms1 = document.getElementById("terms1");
    const terms2 = document.getElementById("terms2");
    const terms3 = document.getElementById("terms3");
    const nextBtn = document.getElementById("nextBtn");
    const errorMessage = document.getElementById("errorMessage");

    const agreeChecks = [terms1, terms2, terms3];

    // 에러 문구 보여주기
    function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
    }

    // 에러 문구 숨기기
    function hideError() {
        errorMessage.textContent = "";
        errorMessage.style.display = "none";
    }

    // 필수 체크 여부에 따라 버튼 활성화
    function updateButtonState() {
        const isRequiredChecked = terms1.checked && terms2.checked;
        nextBtn.disabled = !isRequiredChecked;
    }

    // 개별 체크 상태에 맞춰 전체동의 체크 상태 변경
    function updateAllCheckState() {
        allCheck.checked = agreeChecks.every(function (checkbox) {
            return checkbox.checked;
        });
    }

    // 전체동의 클릭 시 전체 체크/해제
    allCheck.addEventListener("change", function () {
        agreeChecks.forEach(function (checkbox) {
            checkbox.checked = allCheck.checked;
        });

        hideError();
        updateButtonState();
    });

    // 개별 체크박스 클릭 시 처리
    agreeChecks.forEach(function (checkbox) {
        checkbox.addEventListener("change", function () {
            hideError();
            updateAllCheckState();
            updateButtonState();
        });
    });

    // 제출 시 필수 약관 검사
    form.addEventListener("submit", function (e) {
        if (!terms1.checked || !terms2.checked) {
            e.preventDefault();
            showError("필수 약관에 동의해야 회원가입이 가능합니다.");
            return;
        }

        hideError();
    });

    // 처음 화면 진입 시 버튼 비활성화
    updateButtonState();
});
</script>
</head>
<body>

<div class="wrap">
    <h1><a href="/main?lang=kr" class="logo-link">KIA EV</a></h1>

    <form id="termsForm" action="/member/terms" method="post">

        <div class="all-check">
            <label>
                <input type="checkbox" id="allCheck">
                전체 동의
            </label>
        </div>

        <div class="term-box">
            <div class="term-title">[필수] 이용약관 동의</div>
            <textarea class="term-content" readonly>제1조 (목적)
본 약관은 회사가 제공하는 서비스의 이용과 관련하여 회사와 회원 간의 권리, 의무 및 책임사항을 규정함을 목적으로 합니다.

제2조 (서비스 이용)
회원은 본 서비스를 이용함에 있어 관련 법령과 본 약관을 준수하여야 하며, 타인의 권리를 침해하거나 서비스 운영을 방해하는 행위를 해서는 안 됩니다.

제3조 (회원 관리)
회원은 본인의 계정 정보를 성실히 관리해야 하며, 계정의 부정 사용에 대한 책임은 회원 본인에게 있습니다.</textarea>
            <div class="check-line">
                <label>
                    <input type="checkbox" class="agree-check" id="terms1" name="agreeService">
                    이용약관에 동의합니다.
                </label>
            </div>
        </div>

        <div class="term-box">
            <div class="term-title">[필수] 개인정보 수집 및 이용 동의</div>
            <textarea class="term-content" readonly>회사는 회원가입, 본인 확인, 서비스 제공 및 고객상담을 위하여 필요한 최소한의 개인정보를 수집합니다.

1. 수집 항목 : 이름, 아이디, 비밀번호, 이메일, 연락처, 주소
2. 수집 목적 : 회원 식별, 서비스 제공, 고객 문의 대응, 공지사항 전달
3. 보유 기간 : 회원 탈퇴 시까지 또는 관련 법령에 따른 보관 기간까지

회원은 개인정보 수집 및 이용에 대한 동의를 거부할 수 있으나, 필수 항목에 동의하지 않을 경우 회원가입이 제한될 수 있습니다.</textarea>
            <div class="check-line">
                <label>
                    <input type="checkbox" class="agree-check" id="terms2" name="agreePrivacy">
                    개인정보 수집 및 이용에 동의합니다.
                </label>
            </div>
        </div>

        <div class="term-box">
            <div class="term-title">[선택] 마케팅 정보 수신 동의</div>
            <textarea class="term-content" readonly>회사는 이벤트, 프로모션, 신규 서비스 안내, 할인 및 혜택 정보 등을 이메일 또는 문자메시지로 제공할 수 있습니다.

본 동의는 선택 사항이며, 동의하지 않아도 회원가입 및 기본 서비스 이용에는 제한이 없습니다.
또한 회원은 언제든지 마케팅 정보 수신 동의를 철회할 수 있습니다.</textarea>
            <div class="check-line">
                <label>
                    <input type="checkbox" class="agree-check" id="terms3" name="agreeMarketing">
                    마케팅 정보 수신에 동의합니다.
                </label>
            </div>
        </div>

        <div class="btn-box">
            <button type="submit" id="nextBtn" disabled>회원가입 진행</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="notice">
            필수 약관에 모두 동의해야 다음 단계로 이동할 수 있습니다.
        </div>
    </form>
</div>

</body>
</html>
