<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>상담 신청</title>
<style>
/* 1. 바디 기본 설정 */
body {
   margin: 0;
   background: #eef4ff;
   font-family: 'Noto Sans KR', sans-serif;
}

/* 2. 헤더 폭 */
header, .header-wrap {
   width: 100% !important;
   left: 0 !important;
}

/* 3. 본문 전체를 감싸는 영역 (헤더와 겹치지 않게 여백만 줌) */
.consult-page-wrapper {
   width: 100%;
   padding-top: 140px; 
   padding-bottom: 80px;
   display: flex;
   justify-content: center; /* 중앙 정렬 */
}

/* 4. [기존 디자인] 상담 박스 스타일 */
.my-consult-form-box {
   width: 700px;
   background: white;
   padding: 40px;
   border-radius: 12px;
   box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
}

.my-consult-form-box h2 {
   text-align: center;
   margin-bottom: 40px;
   color: #111;
   font-weight: 700;
   margin-top: 0;
}

/* 5. 폼 행 및 라벨 */
.my-consult-form-box .form-row {
   display: flex;
   align-items: center;
   margin-bottom: 18px;
}

.my-consult-form-box .form-row label {
   width: 150px;
   text-align: right;
   margin-right: 20px;
   font-weight: 500;
   color: #333;
}

.my-consult-form-box .form-row input, 
.my-consult-form-box .form-row textarea, 
.my-consult-form-box .form-row select {
   width: 380px;
   padding: 10px;
   border: 1px solid #e2e8f0;
   border-radius: 8px;
   background: #f8fafc;
   font-size: 14px;
   box-sizing: border-box;
}

.my-consult-form-box textarea {
   height: 120px;
   resize: none;
}

/* 6. 버튼 스타일 */
.my-consult-form-box .btn-group {
   margin-top: 35px;
   display: flex;
   justify-content: center;
   gap: 20px;
}

.my-consult-form-box button {
   width: 140px;
   padding: 12px;
   border-radius: 999px;
   border: none;
   font-size: 15px;
   cursor: pointer;
   font-weight: 600;
   transition: background 0.2s ease;
}

.my-consult-form-box .submit-btn { background: #111; color: white; }
.my-consult-form-box .cancel-btn { background: #f1f5f9; color: #111; border: 1px solid #e2e8f0; }
.my-consult-form-box .submit-btn:hover { background: #000; }
.my-consult-form-box .cancel-btn:hover { background: #e2e8f0; }
</style>
</head>
<body>

   <div th:replace="~{common/header :: header}"></div>

   <div class="consult-page-wrapper">
      <div class="my-consult-form-box">
         <h2>상담 신청</h2>

         <form id="consultForm" th:action="@{/consult/register}" method="post" onsubmit="return submitConsult()">
            <input type="hidden" name="memberNo" id="memberNo" th:value="${session.loginUser != null ? session.loginUser.memberNo : ''}">
            <input type="hidden" name="consultStatus" id="consultStatus" value="대기">

            <div class="form-row">
               <label for="carNo">관심차량</label>
               <select id="carNo" name="carNo">
                  <option value="">차량을 선택해주세요</option>
                  <option th:each="car : ${favoriteCarList}" th:value="${car.carNo}" th:text="|♥ ${car.modelName}|" 
                          th:selected="${selectedCarNo != null and selectedCarNo == car.carNo}"></option>
                  <option th:if="${not #lists.isEmpty(favoriteCarList)}" disabled>──────────</option>
                  <option th:each="car : ${allCarList}" th:if="${favoriteCarNoSet == null or !favoriteCarNoSet.contains(car.carNo)}"
                          th:value="${car.carNo}" th:text="${car.modelName}" 
                          th:selected="${selectedCarNo != null and selectedCarNo == car.carNo}"></option>
               </select>
            </div>

            <div class="form-row">
               <label for="budgetAmount">대략 예산금액</label>
               <input type="text" name="budgetAmount" id="budgetAmount" placeholder="숫자만 입력하세요">
            </div>

            <div class="form-row">
               <label for="usePurpose">이용용도</label>
               <select id="usePurpose" name="usePurpose">
                  <option value="">용도를 선택해주세요</option>
                  <option value="출퇴근용">출퇴근용</option>
                  <option value="가족용">가족용</option>
                  <option value="캠핑용">캠핑용</option>
                  <option value="장거리 주행용">장거리 주행용</option>
               </select>
            </div>

            <div class="form-row">
               <label for="mainRangeKm">주요 주행거리</label>
               <select id="mainRangeKm" name="mainRangeKm">
                  <option value="">주행거리를 선택해주세요</option>
                  <option value="단거리">단거리</option>
                  <option value="장거리">장거리</option>
               </select>
            </div>

            <div class="form-row">
               <label for="fellowData">동승자 정보</label>
               <select id="fellowData" name="fellowData">
                  <option value="">동승자를 선택해주세요</option>
                  <option value="없음">없음</option>
                  <option value="영유아">영유아</option>
                  <option value="반려동물">반려동물</option>
                  <option value="성인">성인</option>
                  <option value="기타">기타</option>
               </select>
            </div>

            <div class="form-row">
               <label for="consultContent">상담 내용</label>
               <textarea name="consultContent" id="consultContent" placeholder="추가 문의내용을 입력해주세요"></textarea>
            </div>

            <div class="btn-group">
               <button type="submit" class="submit-btn">신청하기</button>
               <button type="button" class="cancel-btn" onclick="confirmCancel()">취소하기</button>
            </div>
         </form>
      </div>
   </div>

   <div th:replace="~{common/footer :: footer}"></div>

   <script>
      function confirmCancel() {
         if (confirm("상담 신청을 취소하시겠습니까?")) {
            location.href = "/main";
         }
      }

      const budgetInput = document.getElementById('budgetAmount');
      budgetInput.addEventListener('blur', function() {
         let value = this.value.replace(/[^0-9]/g, '');
         if (value) this.value = value + " 만 원";
      });
      budgetInput.addEventListener('focus', function() {
         this.value = this.value.replace(" 만 원", "");
      });

      function submitConsult() {
         const carNo = document.getElementById('carNo').value;
         const mainRangeKm = document.getElementById('mainRangeKm').value;
         budgetInput.value = budgetInput.value.replace(/[^0-9]/g, '');
         if (!carNo) { alert("관심차량을 선택해주세요."); return false; }
         if (!mainRangeKm) { alert("주요 주행거리를 선택해주세요."); return false; }
         if (!confirm("상담을 신청하시겠습니까?")) return false;
         return true;
      }
   </script>
</body>
</html>
