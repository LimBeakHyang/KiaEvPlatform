<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>KIA EV - 메인</title>
<!-- 폰트 추가 (가독성 향상) -->
<link rel="stylesheet" as="style" crossorigin
	href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
body {
	font-family: 'Pretendard', sans-serif;
}

/* 라인업 카드 호버 효과 */
.lineup-card {
	width: 31%;
	background: #fff;
	border-radius: 20px;
	overflow: hidden;
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
	transition: all 0.4s ease;
	cursor: pointer;
	border: 1px solid #f0f0f0;
}

.lineup-card:hover {
	transform: translateY(-10px);
	box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
}

.img-box {
	width: 100%;
	height: 220px;
	background: #fdfdfd;
	display: flex;
	align-items: center;
	justify-content: center;
	overflow: hidden;
}

.img-box img {
	width: 85%;
	object-fit: contain;
	transition: 0.5s;
}

.lineup-card:hover .img-box img {
	transform: scale(1.05);
}

.info-box {
	padding: 30px 25px;
	text-align: left;
}

.info-box h4 {
	margin: 0 0 10px 0;
	font-size: 24px;
	font-weight: 800;
	color: #05141f;
}

.price-text {
	margin: 0;
	font-size: 15px;
	color: #888;
}

.price-value {
	font-size: 20px;
	font-weight: 700;
	color: #05141f;
	margin-top: 5px;
}
</style>
</head>
<script>
	window.onload = function() {
		if (!getCookie("hidePopup")) {
			window.open('/popup', 'EV_Popup',
					'width=420,height=500,top=100,left=100');
		}
	}

	function setPopupCookie(name, value, days) {
		const date = new Date();
		date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
		document.cookie = name + "=" + value + ";expires=" + date.toUTCString()
				+ ";path=/";
	}

	function getCookie(name) {
		const value = `; ${document.cookie}`;
		const parts = value.split(`; ${name}=`);
		if (parts.length === 2)
			return parts.pop().split(';').shift();
	}
</script>
<body style="margin: 0; padding: 0; background-color: #f8f9fa;">

	<!-- 고정 헤더 불러오기 -->
	<th:block th:replace="~{common/header :: header}"></th:block>

	<main
		style="width: 1200px; margin: 0 auto; min-height: 800px; padding-top: 130px; padding-bottom: 100px;">

		<!-- 메인 배너 -->
		<div
			style="width: 100%; height: 400px; background: #05141f; color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 25px; margin-bottom: 80px;">
			<h2 style="font-size: 40px; font-weight: 800;">EV9: The
				All-Electric SUV</h2>
		</div>

		<!-- 라인업 섹션 시작 -->
		<div style="width: 100%;">
			<h3
				style="font-size: 28px; font-weight: 800; color: #05141f; margin-bottom: 40px; padding-left: 10px; border-left: 5px solid #05141f;">KIA
				EV LINE-UP</h3>

			<!-- flex-wrap을 사용하되, 너비를 명확히 계산 -->
			<div
				style="display: flex; flex-wrap: nowrap; justify-content: space-between; gap: 20px;">

				<div th:each="car : ${carLineup}" class="lineup-card"
					style="flex: 1; min-width: 0; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 1px solid #f0f0f0; cursor: pointer;"
					th:onclick="|location.href='@{/car/detail/{id}(id=${car.carNo})}'|">

					<div class="img-box"
						style="width: 100%; height: 240px; background: #fdfdfd; overflow: hidden;">
						<img th:src="${car.imagePath}" th:alt="${car.modelName}"
							style="width: 100%; height: 100%; object-fit: cover; display: block;">
					</div>

					<div class="info-box" style="padding: 25px; background: #fff;">
						<h4 th:text="${car.modelName}"
							style="margin: 0 0 10px 0; font-size: 22px; font-weight: 800; color: #05141f;">모델명</h4>
						<p style="margin: 0; font-size: 14px; color: #888;">판매가</p>
						<div
							style="font-size: 19px; font-weight: 700; color: #05141f; margin-top: 5px;">
							<span th:text="${#numbers.formatInteger(car.price, 3, 'COMMA')}">0</span>원
							~
						</div>
					</div>
				</div>

			</div>
		</div>
	</main>

	<!-- 푸터 불러오기 -->
	<th:block th:replace="~{common/footer :: footer}"></th:block>

</body>
</html>
