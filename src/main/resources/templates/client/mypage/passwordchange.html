<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>비밀번호 변경</title>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Malgun Gothic', sans-serif;
        background: rgba(0, 0, 0, 0.12);
    }

    .popup-wrap {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .popup-box {
        width: 520px;
        background: #f2f2f2;
        border: 1px solid #333;
        padding: 28px 30px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .popup-title {
        text-align: center;
        font-size: 24px;
        font-weight: 800;
        color: #05264a;
        margin-bottom: 24px;
    }

    .row {
        display: flex;
        align-items: center;
        margin-bottom: 14px;
    }

    .row label {
        width: 150px;
        font-size: 15px;
        font-weight: 700;
        color: #222;
    }

    .row input {
        flex: 1;
        height: 40px;
        border: 1px solid #999;
        background: #fff;
        padding: 0 10px;
        font-size: 14px;
    }

    .message-box {
        margin-top: 10px;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
        text-align: center;
        min-height: 22px;
        transition: opacity 0.5s ease;
    }

    .error-message {
        color: red;
    }

    .success-message {
        color: #0b5e2b;
    }

    .btn-area {
        margin-top: 18px;
        text-align: center;
    }

    .btn-area button {
        width: 82px;
        height: 38px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 700;
        font-size: 14px;
        margin: 0 6px;
    }

    .btn-confirm {
        background: #1f4f80;
        color: white;
        border: none;
    }

    .btn-cancel {
        background: #efefef;
        color: #111;
        border: 1px solid #777;
    }

    .guide {
        font-size: 13px;
        color: #666;
        text-align: center;
        margin-top: 12px;
    }
</style>
</head>
<body>

<div class="popup-wrap">
    <div class="popup-box">
        <div class="popup-title">비밀번호 변경</div>

        <!-- 비밀번호 변경 폼 -->
        <form th:action="@{/mypage/passwordChange}" method="post" onsubmit="return validatePw()">
            
            <!-- 현재 비밀번호 입력 -->
            <div class="row">
                <label>현재 비밀번호 입력 :</label>
                <input type="password" id="currentPw" name="currentPw">
            </div>

            <!-- 새 비밀번호 입력 -->
            <div class="row">
                <label>새 비밀번호 입력 :</label>
                <input type="password" id="newPw" name="newPw">
            </div>

            <!-- 새 비밀번호 확인 -->
            <div class="row">
                <label>새 비밀번호 확인 :</label>
                <input type="password" id="confirmPw" name="confirmPw">
            </div>

            <!-- 서버에서 전달된 에러 메시지 출력 -->
            <!-- MypageController에서 errorMessage로 보내주기 때문에 이름을 맞춤 -->
            <div id="serverErrorBox"
                 class="message-box error-message"
                 th:if="${errorMessage != null}"
                 th:text="${errorMessage}"></div>

            <!-- JS에서 바로 보여주는 검증 메시지 -->
            <div id="jsError" class="message-box error-message" style="display:none;"></div>

            <!-- 버튼 영역 -->
            <div class="btn-area">
                <button type="submit" class="btn-confirm">확인</button>
                <button type="button" class="btn-cancel" onclick="history.back()">취소</button>
            </div>

            <!-- 안내 문구 -->
            <div class="guide">현재 비밀번호 확인 후 새 비밀번호로 변경됩니다.</div>
        </form>
    </div>
</div>

<script>
    // 메시지를 잠깐 보여주고 자동으로 사라지게 하는 함수
    function showAndHideMessage(elementId, text, isSuccess) {
        const box = document.getElementById(elementId);
        if (!box) return;

        box.style.display = "block";
        box.style.opacity = "1";
        box.innerText = text;

        if (isSuccess) {
            box.className = "message-box success-message";
        } else {
            box.className = "message-box error-message";
        }

        setTimeout(function () {
            box.style.opacity = "0";
            setTimeout(function () {
                box.style.display = "none";
                box.innerText = "";
            }, 500);
        }, 2500);
    }

    // 비밀번호 입력값 검사
    function validatePw() {
        const currentPw = document.getElementById("currentPw").value.trim();
        const newPw = document.getElementById("newPw").value.trim();
        const confirmPw = document.getElementById("confirmPw").value.trim();

        if (currentPw === "") {
            showAndHideMessage("jsError", "현재 비밀번호를 입력해주세요.", false);
            return false;
        }

        if (newPw === "") {
            showAndHideMessage("jsError", "새 비밀번호를 입력해주세요.", false);
            return false;
        }

        if (confirmPw === "") {
            showAndHideMessage("jsError", "새 비밀번호 확인을 입력해주세요.", false);
            return false;
        }

        if (newPw.length < 4) {
            showAndHideMessage("jsError", "새 비밀번호는 4자 이상 입력해주세요.", false);
            return false;
        }

        if (newPw !== confirmPw) {
            showAndHideMessage("jsError", "새 비밀번호와 비밀번호 확인이 일치하지 않습니다.", false);
            return false;
        }

        if (currentPw === newPw) {
            showAndHideMessage("jsError", "현재 비밀번호와 새 비밀번호가 같습니다.", false);
            return false;
        }

        return true;
    }

    // 서버 에러 메시지가 있으면 잠시 보여주고 자동으로 사라지게 처리
    window.onload = function () {
        const serverErrorBox = document.getElementById("serverErrorBox");

        if (serverErrorBox && serverErrorBox.innerText.trim() !== "") {
            setTimeout(function () {
                serverErrorBox.style.opacity = "0";
                setTimeout(function () {
                    serverErrorBox.style.display = "none";
                }, 500);
            }, 2500);
        }
    };
</script>

<!-- 비밀번호 변경 성공 시 -->
<!-- 이 페이지에서 alert를 띄우고, 사용자가 확인을 누르면 로그인 페이지로 이동 -->
<th:block th:if="${passwordChangeSuccess}">
    <script>
        alert('비밀번호가 정상적으로 변경되었습니다.');
        window.location.href = '/login';
    </script>
</th:block>

</body>
</html>
