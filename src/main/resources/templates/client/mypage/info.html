<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>내 정보 조회</title>
<style>
body {
    background: #f3f3f3;
    font-family: 'Malgun Gothic', sans-serif;
    margin: 0;
    padding: 0;
}

.mypage-container {
    display: flex;
    gap: 26px;
    width: 1200px;
    margin: 30px auto;
}

.side-menu {
    width: 200px;
    background: #001a33;
    color: white;
    padding: 30px 18px;
    border-radius: 18px;
    box-sizing: border-box;
    min-height: 740px;
}

.side-menu h3 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 20px;
    font-weight: bold;
}

.side-menu a {
    display: block;
    background: #0b3258;
    color: white;
    text-decoration: none;
    padding: 14px 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 16px;
}

.side-menu a:hover {
    background: #174a7c;
}

.content-box {
    flex: 1;
    background: #f7f7f7;
    border-radius: 20px;
    padding: 34px 36px;
    box-sizing: border-box;
}

.content-box h2 {
    margin: 0 0 26px 0;
    font-size: 22px;
    color: #001f3f;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 16px;
    font-weight: bold;
    color: #111;
}

.form-control {
    width: 100%;
    height: 54px;
    border: 1px solid #cfcfcf;
    border-radius: 8px;
    padding: 0 14px;
    font-size: 16px;
    background: #fff;
    box-sizing: border-box;
}

.bottom-btn {
    margin-top: 28px;
}

.btn-edit {
    background: #001f3f;
    color: white;
    border: none;
    padding: 13px 24px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
}

.btn-edit:hover {
    background: #003366;
}
</style>
</head>
<body>

<div class="mypage-container">
    <div class="side-menu">
        <h3>MY PAGE</h3>
        <a href="/mypage/info">내 정보 확인</a>
        <a href="/mypage/consult">상담내역 조회</a>
        <a href="/mypage/inquiry">나의 문의 내역</a>
        <a href="/logout">로그아웃</a>
    </div>

    <div class="content-box">
        <h2>내 정보 조회</h2>

        <div class="form-group">
            <label>아이디</label>
            <input type="text" class="form-control" th:value="${loginUser.loginId}" readonly>
        </div>

        <div class="form-group">
            <label>이름</label>
            <input type="text" class="form-control" th:value="${loginUser.memberName}" readonly>
        </div>

        <div class="form-group">
            <label>이메일</label>
            <input type="text" class="form-control" th:value="${loginUser.email}" readonly>
        </div>

        <div class="form-group">
            <label>전화번호</label>
            <input type="text" class="form-control" th:value="${loginUser.phone}" readonly>
        </div>

        <div class="form-group">
            <label>주소</label>
            <input type="text" class="form-control" th:value="${loginUser.address}" readonly>
        </div>

        <div class="form-group">
            <label>상세주소</label>
            <input type="text" class="form-control" th:value="${loginUser.detailAddress}" readonly>
        </div>

        <div class="form-group">
            <label>우편번호</label>
            <input type="text" class="form-control" th:value="${loginUser.zipcode}" readonly>
        </div>

        <div class="form-group">
            <label>회원상태</label>
            <input type="text" class="form-control" th:value="${loginUser.memberStatus}" readonly>
        </div>

        <div class="form-group">
            <label>가입일시</label>
            <input type="text" class="form-control" th:value="${loginUser.joinDate}" readonly>
        </div>

        <div class="form-group">
            <label>회원번호</label>
            <input type="text" class="form-control" th:value="${loginUser.memberNo}" readonly>
        </div>

        <div class="bottom-btn">
            <button type="button" class="btn-edit" onclick="location.href='/mypage/update'">수정하기</button>
        </div>
    </div>
</div>

</body>
</html>
