<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>내 정보 수정</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
}

body {
    background: #f3f3f3;
    color: #111;
}

a {
    text-decoration: none;
    color: inherit;
}

html {
    overflow-y: scroll !important;
}

.mypage-wrap {
    width: 1200px;
    margin: 0 auto;
    padding: 150px 0 100px;
}

.mypage-container {
    display: flex;
    gap: 24px;
    align-items: flex-start;
}

/* 왼쪽 사이드 메뉴 - 위시리스트 스타일 */
.side-menu {
    width: 240px;
    background: #111111;
    border-radius: 12px;
    padding: 40px 25px;
    min-height: 820px;
    position: relative;
}

.menu-list {
    list-style: none;
    margin-top: 30px;
}

.menu-list li {
    margin-bottom: 25px;
}

.menu-list li a {
    color: #fff;
    font-size: 18px;
    font-weight: 500;
    display: block;
}

.menu-list li a:hover {
    color: #89c541;
}

/* 현재 페이지 강조 */
.menu-list li a.active {
    color: #89c541;
    font-weight: 700;
}

/* 로그아웃 */
.logout-box {
    position: absolute;
    left: 25px;
    right: 25px;
    bottom: 25px;
    padding-top: 20px;
    border-top: 1px solid #333;
    text-align: right;
}

.logout-box a {
    color: #999;
    font-size: 16px;
    display: inline-block;
}

.logout-box a:hover {
    color: #fff;
}

/* 오른쪽 본문 */
.content-box {
    flex: 1;
    background: #fff;
    border-radius: 22px;
    padding: 45px;
    min-height: 820px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    border: 1px solid #e7e7e7;
}

.content-box h2 {
    margin: 0 0 30px 0;
    font-size: 24px;
    font-weight: 700;
    color: #05141f;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 16px;
    font-weight: 700;
    color: #111;
}

.form-control {
    width: 100%;
    height: 56px;
    border: 1px solid #dcdcdc;
    border-radius: 10px;
    padding: 0 16px;
    font-size: 16px;
    background: #fff;
    box-sizing: border-box;
}

.pw-row {
    display: flex;
    gap: 10px;
    align-items: center;
}

.pw-row .form-control {
    flex: 1;
}

.btn-password {
    height: 56px;
    padding: 0 18px;
    border: none;
    border-radius: 10px;
    background: #05141f;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
}

.btn-password:hover {
    background: #0b3258;
}

.btn-area {
    margin-top: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.left-btns {
    display: flex;
    gap: 14px;
}

.btn-submit {
    background: #000;
    color: white;
    border: none;
    padding: 13px 22px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}

.btn-cancel {
    background: #d9d9d9;
    color: #111;
    border: none;
    padding: 13px 22px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}

.btn-delete {
    background: #d62828;
    color: #fff;
    border: none;
    padding: 13px 22px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}

.btn-submit:hover {
    background: #222;
}

.btn-cancel:hover {
    background: #c9c9c9;
}

.btn-delete:hover {
    background: #b71c1c;
}
</style>
</head>
<body>

<th:block th:replace="~{common/header :: header}"></th:block>

<div class="mypage-wrap">
    <div class="mypage-container">

        <!-- 왼쪽 사이드 메뉴 -->
        <div class="side-menu">
            <ul class="menu-list">
                <li><a th:href="@{/mypage/myinfo}" class="active">내 정보 확인</a></li>
                <li><a th:href="@{/mypage/consult}">상담내역 조회</a></li>
                <li><a th:href="@{/mypage/board}">나의 문의 내역</a></li>
                <li><a th:href="@{/mypage/wishlist}">관심 차량 목록</a></li>
            </ul>

            <div class="logout-box">
                <a th:href="@{/logout}">로그아웃</a>
            </div>
        </div>

        <!-- 오른쪽 본문 -->
        <div class="content-box">
            <h2>내 정보 수정</h2>

            <form action="/mypage/update" method="post">
                <input type="hidden" name="memberNo" th:value="${loginUser.memberNo}">

                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" name="loginId" class="form-control" th:value="${loginUser.loginId}" readonly>
                </div>

                <div class="form-group">
                    <label>이름</label>
                    <input type="text" name="memberName" class="form-control" th:value="${loginUser.memberName}">
                </div>

                <div class="form-group">
                    <label>비밀번호</label>
                    <div class="pw-row">
                        <input type="password" class="form-control" value="********" readonly>
                        <button type="button" class="btn-password" onclick="location.href='/mypage/passwordChange'">비밀번호 변경</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" name="email" class="form-control" th:value="${loginUser.email}">
                </div>

                <div class="form-group">
                    <label>전화번호</label>
                    <input type="text" name="phone" class="form-control" th:value="${loginUser.phone}">
                </div>

                <div class="form-group">
                    <label>주소</label>
                    <input type="text" name="address" class="form-control" th:value="${loginUser.address}">
                </div>

                <div class="form-group">
                    <label>상세주소</label>
                    <input type="text" name="detailAddress" class="form-control" th:value="${loginUser.detailAddress}">
                </div>

                <div class="form-group">
                    <label>우편번호</label>
                    <input type="text" name="zipcode" class="form-control" th:value="${loginUser.zipcode}">
                </div>

                <div class="form-group">
                    <label>회원상태</label>
                    <input type="text" class="form-control" th:value="${loginUser.memberStatus}" readonly>
                </div>

                <div class="form-group">
                    <label>가입일시</label>
                    <input type="text" class="form-control" th:value="${loginUser.joinDate}" readonly>
                </div>

                <div class="form-group">
                    <label>회원번호</label>
                    <input type="text" class="form-control" th:value="${loginUser.memberNo}" readonly>
                </div>

                <div class="btn-area">
                    <div class="left-btns">
                        <button type="submit" class="btn-submit">수정 완료</button>
                        <button type="button" class="btn-cancel" onclick="location.href='/mypage/myinfo'">취소</button>
                    </div>

                    <button type="button" class="btn-delete" onclick="confirmDelete()">회원 탈퇴</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function confirmDelete() {
    if (confirm("탈퇴 진행 시 복구가 불가합니다.\n정말로 탈퇴를 진행 하시겠습니까?")) {
        location.href = "/mypage/delete";
    }
}
</script>

</body>
</html>
