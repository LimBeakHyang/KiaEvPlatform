<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>문의내역 조회</title>
<style>
body {
    font-family: 'Malgun Gothic', sans-serif;
    background: #f5f6f8;
    margin: 0;
    padding: 0;
}
.wrap {
    width: 1000px;
    margin: 50px auto;
    background: white;
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}
h1 {
    text-align: center;
    color: #0b1f33;
    margin-bottom: 30px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    border: 1px solid #e2e6ea;
    padding: 16px;
    text-align: center;
}
th {
    background: #f3f5f7;
}
.badge {
    display: inline-block;
    min-width: 90px;
    padding: 8px 14px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
}
.wait {
    background: #9aa4af;
}
.done {
    background: #89c541;
}
</style>
</head>
<body>
<div class="wrap">
    <h1>문의내역 조회</h1>
    <table>
        <thead>
            <tr>
                <th>제목</th>
                <th>등록 일자</th>
                <th>문의 상태</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="board : ${boardList}">
                <td th:text="${board.title}"></td>
                <td th:text="${board.regDate}"></td>
                <td>
                    <span th:if="${board.boardStatus == '답변대기'}" class="badge wait" th:text="${board.boardStatus}"></span>
                    <span th:if="${board.boardStatus == '답변완료'}" class="badge done" th:text="${board.boardStatus}"></span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
