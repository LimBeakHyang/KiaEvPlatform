<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 메인화면</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Malgun Gothic', Arial, sans-serif;
            background: #f4f6f8;
            color: #111;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 245px;
            background: #0f172a;
            color: #fff;
            padding: 22px 18px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 26px;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav a {
            display: block;
            padding: 12px 14px;
            color: #d1d5db;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
        }

        .nav a:hover,
        .nav a.active {
            background: #1e293b;
            color: #fff;
        }

        .content {
            flex: 1;
            padding: 26px 28px 40px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 26px;
        }

        .topbar h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
        }

        .admin-info {
            font-size: 15px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card {
            background: #fff;
            border: 1px solid #d9d9d9;
            border-radius: 18px;
            padding: 20px;
            min-height: 210px;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .card-link:hover .card {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        /* 핵심: 내부 영역 높이 고정 */
        .card-title {
            height: 36px;
            display: flex;
            align-items: flex-start;
            margin: 0 0 18px 0;
            font-size: 19px;
            font-weight: 800;
            line-height: 1.3;
        }

        .card-count {
            height: 54px;
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 18px;
        }

        .card-desc {
            height: 58px;
            font-size: 15px;
            line-height: 1.45;
            word-break: keep-all;
        }

        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="layout">

    <aside class="sidebar">
        <div class="logo">KIAEV ADMIN</div>

        <nav class="nav">
            <a href="/admin/main" class="active">대시보드</a>
            <a href="/admin/member/list">회원관리</a>
            <a href="/admin/consult/list">상담관리</a>
            <a href="/admin/board/list">게시판관리</a>
            <a href="/admin/dealer/list">딜러관리</a>
            <a href="/admin/promotion/list">프로모션관리</a>
            <a href="/admin/car/list">차량관리</a>
        </nav>
    </aside>

    <main class="content">
        <div class="topbar">
            <h1>관리자 메인화면</h1>
            <div class="admin-info">ADMIN님</div>
        </div>

        <div class="grid">

            <a href="/admin/car/list" class="card-link">
                <div class="card">
                    <div class="card-title">차량 관리</div>
                    <div class="card-count" th:text="${dashboard.carCount} + '대'">120대</div>
                    <div class="card-desc">
                        최근 등록 차량 :
                        <span th:text="${dashboard.recentCarName}">EV9, EV9 GT</span>
                    </div>
                </div>
            </a>

            <a href="/admin/consult/list" class="card-link">
                <div class="card">
                    <div class="card-title">상담 관리</div>
                    <div class="card-count" th:text="${dashboard.consultCount} + '건'">45건</div>
                    <div class="card-desc">
                        진행 중 상담 :
                        <span th:text="${dashboard.consultingCount}">12</span>건
                    </div>
                </div>
            </a>

            <a href="/admin/dealer/list" class="card-link">
                <div class="card">
                    <div class="card-title">딜러 관리</div>
                    <div class="card-count" th:text="${dashboard.dealerCount} + '명'">15명</div>
                    <div class="card-desc">
                        활성 딜러 수 :
                        <span th:text="${dashboard.activeDealerCount}">12</span>명
                    </div>
                </div>
            </a>

            <a href="/admin/promotion/list" class="card-link">
                <div class="card">
                    <div class="card-title">프로모션 관리</div>
                    <div class="card-count" th:text="${dashboard.promotionCount} + '건'">3건</div>
                    <div class="card-desc">
                        종료 예정 :
                        <span th:text="${dashboard.endingPromotionCount}">1</span>건
                    </div>
                </div>
            </a>

            <a href="/admin/board/list" class="card-link">
                <div class="card">
                    <div class="card-title">게시판 관리</div>
                    <div class="card-count" th:text="${dashboard.boardCount} + '건'">10건</div>
                    <div class="card-desc">
                        최근 게시글 :
                        <span th:text="${dashboard.recentBoardTitle}">차량 구매 관련 문의</span>
                    </div>
                </div>
            </a>

            <a href="/admin/member/list" class="card-link">
                <div class="card">
                    <div class="card-title">회원 관리</div>
                    <div class="card-count" th:text="${dashboard.memberCount} + '명'">320명</div>
                    <div class="card-desc">
                        오늘 가입 회원 :
                        <span th:text="${dashboard.todayJoinCount}">5</span>명
                    </div>
                </div>
            </a>

        </div>
    </main>
</div>
</body>
</html>
