<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로모션 상세</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Malgun Gothic', Arial, sans-serif;
            background: #f4f6f8;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #111827;
            color: white;
            padding: 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .nav a {
            display: block;
            padding: 12px;
            color: #ccc;
            text-decoration: none;
            border-radius: 10px;
        }

        .nav a.active,
        .nav a:hover {
            background: #1f2937;
            color: white;
        }

        .content {
            flex: 1;
            padding: 28px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .breadcrumb {
            color: #777;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #ddd;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 16px;
        }

        .detail dt {
            font-weight: bold;
            padding: 10px 0;
        }

        .detail dd {
            margin: 0;
            padding: 10px 0;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
        }

        .tag {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        .tag.green {
            background: #dcfce7;
        }

        .btn {
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .btn.sub {
            background: white;
            border: 1px solid #ccc;
        }

        .btn.blue {
            background: #2563eb;
            color: white;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="logo">KIAEV ADMIN</div>

        <nav class="nav">
            <a href="#">대시보드</a>
            <a href="#">회원관리</a>
            <a href="#">상담관리</a>
            <a href="#">게시판관리</a>
            <a href="#">딜러관리</a>
            <a href="#" class="active">프로모션관리</a>
            <a href="#">차량관리</a>
        </nav>
    </aside>

    <!-- 메인 -->
    <main class="content">

        <div class="topbar">
            <h1>프로모션 상세</h1>
            <div>ADMIN님</div>
        </div>

        <div class="breadcrumb">
            ADMIN > 프로모션 관리 > 상세확인
        </div>

        <div class="card">

            <p class="section-title">프로모션 상세확인</p>

            <dl class="detail detail-grid">
                <dt>프로모션명</dt>
                <dd>EV 시리즈 봄맞이 혜택</dd>

                <dt>진행 여부</dt>
                <dd><span class="tag green">진행중</span></dd>

                <dt>기간</dt>
                <dd>2026.03.18 ~ 2026.04.18</dd>

                <dt>내용</dt>
                <dd>시승 고객 대상 충전 크레딧 및 계약 혜택 제공</dd>
            </dl>

            <div class="btn-row">
                <a href="#" class="btn sub">목록</a>
                <a href="#" class="btn blue">수정</a>
            </div>

        </div>

    </main>

</div>

</body>
</html>
